name: Build and Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional image tag (e.g. v1.2.3). If omitted, a timestamp-based tag will be used.'
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.image_tag }}" ]; then
              echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
            else
              echo "IMAGE_TAG=manual-$(date +%s)" >> $GITHUB_ENV
            fi
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            pandosme/dataq-backend:${{ env.IMAGE_TAG }}
            pandosme/dataq-backend:latest

      - name: Image info
        run: |
          echo "Pushed images:"
          echo "pandosme/dataq-backend:${{ env.IMAGE_TAG }}"
          echo "pandosme/dataq-backend:latest"

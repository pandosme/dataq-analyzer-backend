# DataQ Analyzer Backend
#
# By default this runs a bundled MongoDB container.
# To use an existing MongoDB instead, remove or comment out the mongodb
# service and volumes sections below, then update the backend environment
# variables to point to your MongoDB host:
#
#   environment:
#     - MONGODB_HOST=your-mongodb-host
#     - MONGODB_AUTH_REQUIRED=true
#     - MONGODB_USERNAME=your-user
#     - MONGODB_PASSWORD=your-password
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down

services:
  backend:
    image: pandosme/dataq-backend:latest
    container_name: dataq-backend
    ports:
      - "3303:80"
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=dataq-analyzer
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: dataq-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
